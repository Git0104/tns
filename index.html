<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mini Minecraft Mobile</title>
<style>
body { margin:0; overflow:hidden; }
#ui {
  position: fixed;
  bottom: 20px;
  left: 20px;
}
button {
  width: 60px;
  height: 60px;
  margin: 5px;
  font-size: 20px;
}
#look {
  position: fixed;
  right: 0;
  top: 0;
  width: 50%;
  height: 100%;
}
</style>
</head>
<body>

<div id="ui">
  <div>
    <button id="w">↑</button>
  </div>
  <div>
    <button id="a">←</button>
    <button id="s">↓</button>
    <button id="d">→</button>
  </div>
</div>

<div id="look"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 地面
const blocks = [];
const geo = new THREE.BoxGeometry(1,1,1);
const mat = new THREE.MeshBasicMaterial({color:0x55aa55});

for(let x=-5;x<=5;x++){
  for(let z=-5;z<=5;z++){
    const cube = new THREE.Mesh(geo, mat);
    cube.position.set(x,0,z);
    scene.add(cube);
    blocks.push(cube);
  }
}

camera.position.set(0,2,5);

// 移動
let move = {w:false,a:false,s:false,d:false};

["w","a","s","d"].forEach(k=>{
  const btn = document.getElementById(k);
  btn.ontouchstart = ()=> move[k]=true;
  btn.ontouchend = ()=> move[k]=false;
});

// 視点操作
let rotX = 0, rotY = 0;
const look = document.getElementById("look");

let lastX, lastY;

look.ontouchstart = e=>{
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
};

look.ontouchmove = e=>{
  const dx = e.touches[0].clientX - lastX;
  const dy = e.touches[0].clientY - lastY;

  rotY -= dx * 0.005;
  rotX -= dy * 0.005;

  camera.rotation.set(rotX, rotY, 0);

  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
};

// ブロック操作
const raycaster = new THREE.Raycaster();

renderer.domElement.addEventListener("touchstart", e=>{
  raycaster.setFromCamera({x:0,y:0}, camera);
  const hit = raycaster.intersectObjects(blocks);

  if(hit.length > 0){
    const obj = hit[0].object;
    scene.remove(obj);
    blocks.splice(blocks.indexOf(obj),1);
  }
});

// 描画
function animate(){
  requestAnimationFrame(animate);

  const speed = 0.1;

  if(move.w){
    camera.position.x -= Math.sin(rotY)*speed;
    camera.position.z -= Math.cos(rotY)*speed;
  }
  if(move.s){
    camera.position.x += Math.sin(rotY)*speed;
    camera.position.z += Math.cos(rotY)*speed;
  }
  if(move.a){
    camera.position.x -= Math.cos(rotY)*speed;
    camera.position.z += Math.sin(rotY)*speed;
  }
  if(move.d){
    camera.position.x += Math.cos(rotY)*speed;
    camera.position.z -= Math.sin(rotY)*speed;
  }

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
