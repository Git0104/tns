<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mini Minecraft</title>
<style>
body { margin: 0; overflow: hidden; }
#info {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-family: sans-serif;
}
</style>
</head>
<body>
<div id="info">クリックで開始 / 左クリック:壊す 右クリック:置く WASD移動</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 操作
const controls = new THREE.PointerLockControls(camera, document.body);
document.addEventListener('click', () => controls.lock());
scene.add(controls.getObject());

// 地面
const blocks = [];
const geometry = new THREE.BoxGeometry(1,1,1);
const material = new THREE.MeshBasicMaterial({color: 0x55aa55});

for(let x=-5;x<=5;x++){
  for(let z=-5;z<=5;z++){
    const cube = new THREE.Mesh(geometry, material);
    cube.position.set(x,0,z);
    scene.add(cube);
    blocks.push(cube);
  }
}

// プレイヤー
let move = {forward:false, back:false, left:false, right:false};

document.addEventListener('keydown', e=>{
  if(e.code==="KeyW") move.forward=true;
  if(e.code==="KeyS") move.back=true;
  if(e.code==="KeyA") move.left=true;
  if(e.code==="KeyD") move.right=true;
});

document.addEventListener('keyup', e=>{
  if(e.code==="KeyW") move.forward=false;
  if(e.code==="KeyS") move.back=false;
  if(e.code==="KeyA") move.left=false;
  if(e.code==="KeyD") move.right=false;
});

// レイキャスト
const raycaster = new THREE.Raycaster();

// クリック
document.addEventListener('mousedown', e=>{
  raycaster.setFromCamera({x:0,y:0}, camera);
  const intersects = raycaster.intersectObjects(blocks);

  if(intersects.length > 0){
    const target = intersects[0].object;

    if(e.button === 0){ // 左クリック 削除
      scene.remove(target);
      blocks.splice(blocks.indexOf(target),1);
    }

    if(e.button === 2){ // 右クリック 追加
      const normal = intersects[0].face.normal;
      const newBlock = new THREE.Mesh(geometry, material);
      newBlock.position.copy(target.position).add(normal);
      scene.add(newBlock);
      blocks.push(newBlock);
    }
  }
});

// 右クリックメニュー消す
window.oncontextmenu = ()=>false;

// 移動
function animate(){
  requestAnimationFrame(animate);

  const speed = 0.1;

  if(move.forward) controls.moveForward(speed);
  if(move.back) controls.moveForward(-speed);
  if(move.left) controls.moveRight(-speed);
  if(move.right) controls.moveRight(speed);

  renderer.render(scene, camera);
}

camera.position.y = 2;
animate();
</script>
</body>
</html>
